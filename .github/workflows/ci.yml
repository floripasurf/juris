name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync deps
        run: uv sync --frozen || uv sync

      # --- Hard gates (block the build) ---------------------------------------
      - name: Ruff — lint src + tests
        run: uv run ruff check src/juris tests

      - name: Pytest — unit suite
        run: uv run pytest tests/unit -q

      # --- Mypy: hard on the clean packages, informational on the rest ---------
      # Trilha E-2: these packages are mypy-clean and must NOT regress (hard gate).
      # Remaining debt (cli/persistence/signing/mni/jobs/repertory) is cleaned by
      # track; the full run is informational until it's zeroed, then folded in here.
      - name: Mypy — clean packages (hard gate)
        run: >
          uv run mypy
          src/juris/agents src/juris/alerts src/juris/api src/juris/busca
          src/juris/core src/juris/defesas src/juris/demo src/juris/escavacao
          src/juris/prazo src/juris/review src/juris/web

      - name: Mypy — full (informational, shrinking)
        run: uv run mypy src/juris || true
