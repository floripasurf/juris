name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync deps
        run: uv sync --frozen || uv sync

      # --- Hard gates (block the build) ---------------------------------------
      - name: Ruff — lint src + tests
        run: uv run ruff check src/juris tests

      - name: Pytest — unit suite
        run: uv run pytest tests/unit -q

      # --- Mypy: hard on the clean+fully-tracked packages, informational rest ---
      # Trilha E-2: these packages are mypy-clean AND have no engine-local
      # (gitignored) source, so local == CI — safe as a hard gate (anti-regression).
      # Mixed packages (engine-local files) + the debt tracks (cli/persistence/
      # signing/mni/jobs/repertory) stay in the informational run until folded in.
      - name: Mypy — clean packages (hard gate)
        run: >
          uv run mypy
          src/juris/alerts src/juris/api src/juris/busca
          src/juris/demo src/juris/escavacao src/juris/web

      - name: Mypy — full (informational, shrinking)
        run: uv run mypy src/juris || true
