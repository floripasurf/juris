name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync deps
        run: uv sync --frozen

      - name: Secrets — high-risk patterns
        run: uv run python scripts/scan_secrets.py

      # --- Hard gates (block the build) ---------------------------------------
      - name: Ruff — lint src + tests + scripts
        run: uv run ruff check src/juris tests scripts/scan_secrets.py

      - name: Mypy — full project
        run: uv run mypy src/juris

      - name: Pytest — unit suite + coverage ratchet
        run: uv run pytest tests/unit -q --cov=juris --cov-report=term-missing --cov-report=xml

      - name: Dependency audit — Python
        run: uv run --with pip-audit pip-audit --local --strict

  extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs/browser-extension
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Dependency audit — extension
        run: npm audit --audit-level=high

      - name: Vitest — selectors/parsers
        run: npm test

      - name: Build + package (esbuild + zip)
        run: npm run package
