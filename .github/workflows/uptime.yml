name: Causia External Uptime

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  public-edge:
    name: Public edge probe
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      CAUSIA_UPTIME_URL: ${{ vars.CAUSIA_UPTIME_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Probe landing and API health through DNS + Cloudflare Tunnel
        run: |
          python scripts/check_external_uptime.py \
            --url "${CAUSIA_UPTIME_URL:-https://causia.com.br/}" \
            --json
